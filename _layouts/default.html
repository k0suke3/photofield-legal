<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title | default: site.title }}</title>
  <style>
    :root { --fg:#1f2328; --muted:#656d76; --accent:#b8860b; --line:#e5e7eb; --bg:#ffffff; --th:#f6f8fa; }
    @media (prefers-color-scheme: dark) {
      :root { --fg:#e6edf3; --muted:#9198a1; --accent:#e3b341; --line:#30363d; --bg:#0d1117; --th:#161b22; }
    }
    * { box-sizing:border-box; }
    body { margin:0; background:var(--bg); color:var(--fg); -webkit-text-size-adjust:100%;
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Hiragino Sans","Noto Sans JP",sans-serif;
      line-height:1.75; }
    .wrap { max-width:720px; margin:0 auto; padding:8px 20px 64px; }
    .brand { font-size:12px; letter-spacing:.12em; color:var(--muted); text-transform:uppercase;
      padding:18px 0; border-bottom:1px solid var(--line); margin-bottom:28px; }
    h1 { font-size:25px; line-height:1.4; margin:0 0 18px; }
    h2 { font-size:18px; margin:34px 0 10px; }
    p, li { font-size:15px; }
    a { color:var(--accent); }
    ul { padding-left:1.25em; }
    table { width:100%; border-collapse:collapse; margin:16px 0; font-size:13.5px; display:block; overflow-x:auto; }
    th, td { border:1px solid var(--line); padding:8px 10px; text-align:left; vertical-align:top; }
    th { background:var(--th); white-space:nowrap; }
    hr { border:none; border-top:1px solid var(--line); margin:32px 0; }
    code { background:var(--th); padding:2px 5px; border-radius:4px; font-size:.9em; }
    .foot { margin-top:48px; padding-top:20px; border-top:1px solid var(--line); font-size:13px; color:var(--muted); }
    .foot a { color:var(--muted); }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="brand">PhotoField Simulator</div>
    {{ content }}
    <div class="foot">
      <a href="{{ '/' | relative_url }}">← 規約・ポリシー一覧へ</a><br>
      © 2026 末次厚裕 · <a href="mailto:photofieldsim.support@gmail.com">photofieldsim.support@gmail.com</a>
    </div>
  </div>
</body>
</html>
